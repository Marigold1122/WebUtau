<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melody Singer - Logic Pro 风格原型</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #1e1e1e;
    color: #d4d4d4;
    overflow: hidden;
    height: 100vh;
}

/* 顶部工具栏 */
.top-toolbar {
    height: 48px;
    background: #2d2d2d;
    border-bottom: 1px solid #3e3e3e;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 16px;
}

.transport-controls {
    display: flex;
    gap: 8px;
}

.transport-btn {
    width: 36px;
    height: 36px;
    border-radius: 4px;
    border: none;
    background: #3a3a3a;
    color: #d4d4d4;
    cursor: pointer;
    font-size: 16px;
    transition: background 0.15s;
}

.transport-btn:hover { background: #4a4a4a; }
.transport-btn.record { background: #c41e3a; color: white; }
.transport-btn.record:hover { background: #d42e4a; }

.time-display {
    background: #252525;
    border: 1px solid #3e3e3e;
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 1px;
}

.spacer { flex: 1; }

.utility-btns {
    display: flex;
    gap: 8px;
}

.utility-btn {
    padding: 8px 16px;
    background: #3a3a3a;
    border: 1px solid #4a4a4a;
    border-radius: 4px;
    color: #d4d4d4;
    cursor: pointer;
    font-size: 13px;
}

.utility-btn:hover { background: #4a4a4a; }

/* 主容器 */
.main-container {
    display: flex;
    height: calc(100vh - 48px);
}

/* 左侧边栏 */
.left-sidebar {
    width: 240px;
    background: #252525;
    border-right: 1px solid #3e3e3e;
    display: flex;
    flex-direction: column;
}

.sidebar-header {
    height: 40px;
    background: #2a2a2a;
    border-bottom: 1px solid #3e3e3e;
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-size: 13px;
    font-weight: 600;
}

.track-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
}

.track-item {
    background: #2d2d2d;
    border: 1px solid #3e3e3e;
    border-radius: 4px;
    padding: 10px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: background 0.15s;
}

.track-item:hover { background: #353535; }
.track-item.active { background: #3a4a5a; border-color: #5a7a9a; }

.track-name {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
}

.track-controls {
    display: flex;
    gap: 6px;
    font-size: 11px;
}

.track-btn {
    padding: 4px 8px;
    background: #3a3a3a;
    border: 1px solid #4a4a4a;
    border-radius: 3px;
    cursor: pointer;
}

/* 中央工作区 */
.center-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #1e1e1e;
}

/* 轨道视图 */
.track-view {
    height: 35%;
    background: #252525;
    border-bottom: 1px solid #3e3e3e;
    position: relative;
}

.track-header {
    height: 36px;
    background: #2a2a2a;
    border-bottom: 1px solid #3e3e3e;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 12px;
}

.track-canvas {
    height: calc(100% - 36px);
    background: #1e1e1e;
    position: relative;
    overflow: auto;
}

/* 钢琴卷帘 */
.piano-roll {
    flex: 1;
    background: #1e1e1e;
    display: flex;
}

.piano-keys {
    width: 80px;
    background: #252525;
    border-right: 1px solid #3e3e3e;
}

.piano-canvas {
    flex: 1;
    background: #1a1a1a;
    position: relative;
}

/* 右侧检查器 */
.right-sidebar {
    width: 280px;
    background: #252525;
    border-left: 1px solid #3e3e3e;
    overflow-y: auto;
}

.inspector-section {
    border-bottom: 1px solid #3e3e3e;
    padding: 16px;
}

.inspector-title {
    font-size: 12px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    margin-bottom: 12px;
}

.inspector-control {
    margin-bottom: 12px;
}

.inspector-label {
    font-size: 12px;
    margin-bottom: 4px;
    color: #aaa;
}

.inspector-input {
    width: 100%;
    padding: 8px;
    background: #2d2d2d;
    border: 1px solid #3e3e3e;
    border-radius: 4px;
    color: #d4d4d4;
    font-size: 13px;
}

/* 模拟内容 */
.mock-region {
    position: absolute;
    background: linear-gradient(135deg, #d4a017 0%, #c4901f 100%);
    border: 1px solid #e4b027;
    border-radius: 4px;
    top: 20px;
    left: 100px;
    width: 400px;
    height: 60px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    color: #1e1e1e;
    font-weight: 600;
    font-size: 12px;
}

.mock-notes {
    position: absolute;
    top: 50px;
    left: 100px;
}

.mock-note {
    position: absolute;
    background: #d4a017;
    border: 1px solid #e4b027;
    border-radius: 2px;
    height: 12px;
}
</style>
</head>
<body>

<!-- 顶部工具栏 -->
<div class="top-toolbar">
    <div class="transport-controls">
        <button class="transport-btn">◀◀</button>
        <button class="transport-btn">▶</button>
        <button class="transport-btn record">●</button>
        <button class="transport-btn">⏹</button>
    </div>

    <div class="time-display">1 1 1 110</div>

    <div class="spacer"></div>

    <div class="utility-btns">
        <button class="utility-btn">吸附</button>
        <button class="utility-btn">循环</button>
        <button class="utility-btn">节拍器</button>
    </div>
</div>

<!-- 主容器 -->
<div class="main-container">
    <!-- 左侧边栏 -->
    <div class="left-sidebar">
        <div class="sidebar-header">轨道列表</div>
        <div class="track-list">
            <div class="track-item active">
                <div class="track-name">🎤 南加风情</div>
                <div class="track-controls">
                    <span class="track-btn">M</span>
                    <span class="track-btn">S</span>
                    <span class="track-btn">R</span>
                </div>
            </div>
            <div class="track-item">
                <div class="track-name">🎹 钢琴伴奏</div>
                <div class="track-controls">
                    <span class="track-btn">M</span>
                    <span class="track-btn">S</span>
                    <span class="track-btn">R</span>
                </div>
            </div>
            <div class="track-item">
                <div class="track-name">🥁 鼓组</div>
                <div class="track-controls">
                    <span class="track-btn">M</span>
                    <span class="track-btn">S</span>
                    <span class="track-btn">R</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 中央工作区 -->
    <div class="center-area">
        <!-- 轨道视图 -->
        <div class="track-view">
            <div class="track-header">
                <button class="utility-btn">+ 新建轨道</button>
                <button class="utility-btn">导入 MIDI</button>
            </div>
            <div class="track-canvas">
                <div class="mock-region">鼓手 - 流行摇滚</div>
            </div>
        </div>

        <!-- 钢琴卷帘 -->
        <div class="piano-roll">
            <div class="piano-keys"></div>
            <div class="piano-canvas">
                <div class="mock-notes">
                    <div class="mock-note" style="left: 0; top: 20px; width: 80px;"></div>
                    <div class="mock-note" style="left: 100px; top: 40px; width: 60px;"></div>
                    <div class="mock-note" style="left: 180px; top: 60px; width: 100px;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 右侧检查器 -->
    <div class="right-sidebar">
        <div class="inspector-section">
            <div class="inspector-title">轨道设置</div>
            <div class="inspector-control">
                <div class="inspector-label">歌手</div>
                <select class="inspector-input">
                    <option>南加风情</option>
                    <option>其他歌手</option>
                </select>
            </div>
            <div class="inspector-control">
                <div class="inspector-label">音量</div>
                <input type="range" class="inspector-input" value="80">
            </div>
        </div>

        <div class="inspector-section">
            <div class="inspector-title">合成设置</div>
            <div class="inspector-control">
                <div class="inspector-label">状态</div>
                <button class="utility-btn" style="width: 100%;">开始合成</button>
            </div>
        </div>

        <div class="inspector-section">
            <div class="inspector-title">变声设置</div>
            <div class="inspector-control">
                <div class="inspector-label">参考音频</div>
                <button class="utility-btn" style="width: 100%;">选择文件</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
