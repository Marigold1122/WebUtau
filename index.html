<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>web utau</title>
    <link rel="icon" href="data:," />
    <!-- 引入 Atomic Pro Desk 专业排版字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&family=Oswald:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/host-dialog.css" />
  </head>
  <body>
    <div id="app">
      <header class="menubar">
        <div class="menu-items">
          <button type="button" class="menu-item" id="btn-import" title="文件">文件</button>
          <input type="file" id="midi-file-input" accept=".mid,.midi" hidden />
          <input type="file" id="audio-file-input" accept="audio/*,.wav,.mp3,.flac,.m4a,.ogg" hidden />
        </div>
        <div class="menubar-center">
          <div class="menubar-transport" aria-label="顶部播放控制">
            <button type="button" class="menubar-transport-btn" id="btn-top-prev" title="后退一小节" aria-label="后退一小节">
              <span class="menubar-transport-glyph menubar-transport-glyph--prev"></span>
            </button>
            <button type="button" class="menubar-transport-btn menubar-transport-btn--play" id="btn-top-play" title="播放" aria-label="播放">
              <span class="menubar-transport-glyph menubar-transport-glyph--play"></span>
            </button>
            <button type="button" class="menubar-transport-btn" id="btn-top-stop" title="停止" aria-label="停止">
              <span class="menubar-transport-glyph menubar-transport-glyph--stop"></span>
            </button>
            <button type="button" class="menubar-transport-btn menubar-transport-btn--record" id="btn-top-record" title="开始 MIDI 录制" aria-label="开始 MIDI 录制">
              <span class="menubar-transport-glyph menubar-transport-glyph--record"></span>
            </button>
            <button type="button" class="menubar-transport-btn" id="btn-top-next" title="前进一小节" aria-label="前进一小节">
              <span class="menubar-transport-glyph menubar-transport-glyph--next"></span>
            </button>
          </div>
          <div class="menubar-readouts">
            <div class="pro-display">
              <div class="display-block">
                <span class="display-label">BPM</span>
                <span class="display-value bpm-display" id="bpm-display">120</span>
              </div>
              <div class="display-block">
                <span class="display-label">TIME</span>
                <span class="display-value time-display" id="time-display">00:00.000</span>
              </div>
            </div>
            <span class="render-status idle" id="render-status-badge"></span>
          </div>
        </div>
        <div class="menubar-tail">
          <div class="menubar-follow-tools" id="menubar-follow-tools" aria-label="播放头跟随模式"></div>
        </div>
      </header>

      <div class="app-container">
        <main class="workspace piano-hidden" id="workspace">
          <section class="track-view" id="track-view">
            <div class="track-timeline-wrapper">
              <div class="track-ruler-shell">
                <div class="track-ruler-gutter" aria-hidden="true"></div>
                <div class="track-ruler" id="track-ruler">
                  <div class="track-ruler-inner" id="track-ruler-inner"></div>
                </div>
              </div>

              <div class="track-viewport" id="track-viewport">
                <div class="timeline-spacer" id="track-timeline-content"></div>
              </div>

              <div class="track-empty-hint" id="track-empty-hint"></div>
            </div>
          </section>

          <div class="panel-resizer" id="panel-resizer"></div>

          <section class="editor-panel hidden" id="editor-panel">
            <div class="editor-header">
              <span class="editor-track-name" id="active-track-name">—</span>
              <div class="editor-runtime-tools" id="editor-runtime-tools"></div>
              <button type="button" class="editor-close" id="btn-close-editor">关闭</button>
            </div>

            <div class="editor-body">
              <iframe
                id="voice-runtime-frame"
                class="voice-runtime-frame"
                title="人声合成运行时"
                loading="eager"
                allow="autoplay"
              ></iframe>
              <div
                id="instrument-editor-root"
                class="instrument-editor-host"
                hidden
              ></div>
            </div>
          </section>
        </main>

        <aside class="inspector" id="main-inspector">
          <div class="inspector-content">
            <!-- 信息标签页 -->
            <div class="inspector-tab-panel" id="inspector-tab-info">
              <section class="panel-section">
                <h2>项目</h2>
                <div class="prop-row"><label>文件</label><div class="prop-value" id="project-file-name">—</div></div>
                <div class="prop-row"><label>轨道</label><div class="prop-value" id="project-track-count">0</div></div>
              </section>

              <section class="panel-section">
                <h2>当前轨道</h2>
                <div class="prop-row"><label>名称</label><div class="prop-value" id="selected-track-name">—</div></div>
                <div class="prop-row"><label>类型</label><div class="prop-value" id="selected-track-kind">-</div></div>
                <div class="prop-row"><label>统计</label><div class="prop-value" id="selected-track-stats">-</div></div>
                <div class="prop-row"><label>长度</label><div class="prop-value" id="selected-track-length">-</div></div>
                <div class="prop-row"><label>语言</label><div class="prop-value" id="selected-track-language">未设置</div></div>
                <div class="prop-row"><label>状态</label><div class="prop-value" id="selected-track-status">-</div></div>
              </section>

              <section class="panel-section" id="share-tunnel-section"></section>
            </div>

            <!-- 声库标签页 -->
            <div class="inspector-tab-panel" id="inspector-tab-voicebank" hidden>
              <section class="panel-section">
                <h2>声库</h2>
                <div class="prop-row"><label>声库</label><select class="prop-select" id="selected-track-voicebank"></select></div>
              </section>
            </div>

            <!-- 音色转换标签页 -->
            <div class="inspector-tab-panel" id="inspector-tab-vc" hidden>
              <section class="panel-section voice-conversion-section" id="voice-conversion-section" hidden>
                <h2>音色转换</h2>
                <div class="voice-conversion-note" data-vc-ref="message" hidden></div>
                <div class="voice-conversion-card" data-vc-ref="body">
                  <div class="voice-conversion-status" data-vc-ref="status"></div>
                  <div class="voice-conversion-draft" data-vc-ref="draft" hidden></div>

                  <div class="voice-conversion-file">
                    <div class="voice-conversion-file-row">
                      <button type="button" class="panel-action-btn panel-action-btn--primary" data-vc-ref="reference-button">选择参考</button>
                      <input type="file" accept="audio/*,.wav,.mp3,.flac,.m4a,.ogg" hidden data-vc-ref="reference-input" />
                    </div>
                    <div class="prop-value voice-conversion-reference-name" data-vc-ref="reference-name">未选择参考音频</div>
                  </div>

                  <div class="voice-conversion-param">
                    <div class="voice-conversion-param-head">
                      <label for="vc-param-steps">扩散步数</label>
                      <span data-vc-value="diffusionSteps">20</span>
                    </div>
                    <input id="vc-param-steps" type="range" min="1" max="40" step="1" data-vc-param="diffusionSteps" />
                  </div>

                  <div class="voice-conversion-param">
                    <div class="voice-conversion-param-head">
                      <label for="vc-param-length">长度调整</label>
                      <span data-vc-value="lengthAdjust">1.00</span>
                    </div>
                    <input id="vc-param-length" type="range" min="0.5" max="2" step="0.01" data-vc-param="lengthAdjust" />
                  </div>

                  <div class="voice-conversion-param">
                    <div class="voice-conversion-param-head">
                      <label for="vc-param-cfg">CFG</label>
                      <span data-vc-value="cfgRate">0.70</span>
                    </div>
                    <input id="vc-param-cfg" type="range" min="0" max="1" step="0.01" value="0.7" data-vc-param="cfgRate" />
                  </div>

                  <div class="voice-conversion-param">
                    <div class="voice-conversion-param-head">
                      <label for="vc-param-pitch">音高偏移</label>
                      <span data-vc-value="pitchShift">0</span>
                    </div>
                    <input id="vc-param-pitch" type="number" min="-24" max="24" step="1" data-vc-param="pitchShift" />
                  </div>

                  <label class="voice-conversion-check">
                    <input type="checkbox" checked data-vc-param="f0Condition" />
                    <span>启用 F0 条件</span>
                  </label>

                  <label class="voice-conversion-check">
                    <input type="checkbox" data-vc-param="autoF0Adjust" />
                    <span>自动 F0 对齐</span>
                  </label>

                  <div class="voice-conversion-actions">
                    <button type="button" class="panel-action-btn panel-action-btn--primary" data-vc-ref="start-button">开始转换</button>
                    <button type="button" class="panel-action-btn panel-action-btn--danger" data-vc-ref="cancel-button">取消当前合成</button>
                    <button type="button" class="panel-action-btn" data-vc-ref="apply-button">应用转换后</button>
                    <button type="button" class="panel-action-btn" data-vc-ref="restore-button">恢复原始</button>
                    <button type="button" class="panel-action-btn" data-vc-ref="clear-button">清除结果</button>
                  </div>
                </div>
              </section>
            </div>

                        <!-- 音色标签页 -->
            <div class="inspector-tab-panel" id="inspector-tab-tone" hidden></div>

            <!-- 关于标签页 -->
            <div class="inspector-tab-panel" id="inspector-tab-about" hidden>
              <section class="panel-section">
                <h2>关于</h2>
                <div class="about-info">
                  <div class="about-app-name">WEB UTAU</div>
                  <div class="about-description">AI 歌声合成工作站</div>
                </div>
              </section>
            </div>
          </div>

          <div class="side-toolbar">
            <button
              type="button"
              class="side-icon active"
              id="btn-inspector-toggle"
              title="收起右侧面板"
              aria-label="收起右侧面板"
              aria-pressed="true"
            ></button>
            <div class="side-toolbar-separator"></div>
            <button type="button" class="side-tab-btn active" id="btn-tab-info" data-tab="info" title="信息" aria-label="信息">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.3"/><path d="M8 7v4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="8" cy="5" r="0.8" fill="currentColor"/></svg>
              <span>信息</span>
            </button>
            <button type="button" class="side-tab-btn" id="btn-tab-voicebank" data-tab="voicebank" title="声库" aria-label="声库">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v8M8 10a2.5 2.5 0 1 0 0 .01" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 7.5V10a3 3 0 0 0 6 0V7.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M8 13v1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
              <span>声库</span>
            </button>
            <button type="button" class="side-tab-btn" id="btn-tab-vc" data-tab="vc" title="音色转换" aria-label="音色转换">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M11 4L5 8l6 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 8h2M11 8h2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
              <span>转换</span>
            </button>
                        <button type="button" class="side-tab-btn" id="btn-tab-tone" data-tab="tone" title="音色" aria-label="音色">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M5 3.5a1.5 1.5 0 1 1 3 0V7a4 4 0 1 1-1.4-3.05V3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><circle cx="10.8" cy="9.8" r="1.2" fill="currentColor"/></svg>
              <span>音色</span>
            </button>
            <button type="button" class="side-tab-btn" id="btn-tab-about" data-tab="about" title="关于" aria-label="关于">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.3"/><path d="M6.5 6.2a1.5 1.5 0 0 1 2.9.5c0 1-1.4 1.2-1.4 2.3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><circle cx="8" cy="12" r="0.8" fill="currentColor"/></svg>
              <span>关于</span>
            </button>
          </div>
        </aside>
      </div>

      <div id="status-bar" class="is-empty">
        <span id="status-text"></span>
      </div>
    </div>

    <div class="modal-overlay" id="track-language-modal" role="dialog" aria-modal="true" aria-labelledby="track-language-title">
      <div class="modal-dialog">
        <div class="modal-title" id="track-language-title">选择语言</div>
        <div class="modal-hint" id="track-language-hint"></div>
        <div class="modal-field">
          <label class="modal-label" for="track-language-select">歌曲语言</label>
          <select class="modal-select" id="track-language-select"></select>
        </div>
        <div class="modal-field">
          <label class="modal-label" for="track-voicebank-select">声库</label>
          <select class="modal-select" id="track-voicebank-select"></select>
        </div>
        <div class="modal-actions">
          <button type="button" class="modal-btn secondary" id="btn-track-language-cancel">取消</button>
          <button type="button" class="modal-btn primary" id="btn-track-language-confirm">继续</button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="track-synthesis-overlay" aria-hidden="true">
      <div class="modal-dialog modal-dialog--compact">
        <div class="modal-title" id="track-synthesis-title">正在预测音高</div>
        <div class="modal-hint" id="track-synthesis-text">正在预测音高 0%</div>
        <div class="modal-progress">
          <div class="modal-progress-bar">
            <div class="modal-progress-fill" id="track-synthesis-fill"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="project-timing-import-modal" role="dialog" aria-modal="true" aria-labelledby="project-timing-import-title">
      <div class="modal-dialog">
        <div class="modal-title" id="project-timing-import-title">导入时序信息</div>
        <div class="modal-hint" id="project-timing-import-hint"></div>
        <div class="modal-field">
          <label class="modal-label">导入工程</label>
          <div class="modal-summary" id="project-timing-import-summary"></div>
        </div>
        <div class="modal-field" id="project-timing-current-section">
          <label class="modal-label">当前工程</label>
          <div class="modal-summary" id="project-timing-current-summary"></div>
        </div>
        <div class="modal-actions">
          <button type="button" class="modal-btn secondary" id="btn-project-timing-cancel">取消</button>
          <button type="button" class="modal-btn secondary" id="btn-project-timing-keep">保持当前工程</button>
          <button type="button" class="modal-btn primary" id="btn-project-timing-sync">同步应用</button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="export-audio-modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="export-audio-title">
      <div class="modal-dialog">
        <div class="modal-title" id="export-audio-title">导出音频</div>
        <div class="modal-hint">将当前项目按播放效果混合导出为 WAV 文件</div>
        <div class="modal-field">
          <label class="modal-label" for="export-sample-rate">采样率</label>
          <select class="modal-select" id="export-sample-rate"></select>
        </div>
        <div class="modal-field">
          <label class="modal-label" for="export-bit-depth">位深度</label>
          <select class="modal-select" id="export-bit-depth"></select>
        </div>
        <div class="modal-field">
          <label class="modal-label" for="export-channels">声道</label>
          <select class="modal-select" id="export-channels"></select>
        </div>
        <div class="modal-field export-progress-section" id="export-progress-section">
          <div class="modal-progress">
            <div class="modal-progress-bar">
              <div class="modal-progress-fill" id="export-progress-fill"></div>
            </div>
          </div>
          <div class="export-progress-text" id="export-progress-text"></div>
        </div>
        <div class="export-warning-text" id="export-warning-text"></div>
        <div class="modal-actions export-actions">
          <button type="button" class="modal-btn secondary" id="btn-export-audio-cancel">取消</button>
          <button type="button" class="modal-btn secondary" id="btn-export-audio-selected" disabled>导出所选轨道</button>
          <button type="button" class="modal-btn primary" id="btn-export-audio-confirm">整体导出</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/host/main.js"></script>
  </body>
</html>
